<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="470" viewBox="0 0 1280 470" role="img" aria-label="Lula 从种子测试、留存验证、付费验证到大货销售的市场验证路径">
  <defs>
    <pattern id="dot-grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="#D8DCE6" opacity="0.72"/>
    </pattern>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M1 1L11 6L1 11Z" fill="#A8A0FF"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M1 1L11 6L1 11Z" fill="#FF9D7A"/>
    </marker>
    <style>
      .title { font: 700 16px Inter, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #3F3F73; }
      .body { font: 500 12px Inter, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #6B6F8A; }
      .badge { font: 700 11px Inter, "PingFang SC", "Microsoft YaHei", sans-serif; letter-spacing: .04em; }
      .edge-label { font: 700 11px Inter, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #6B6F8A; }
      .line { fill: none; stroke: #A8A0FF; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); }
      .feedback { fill: none; stroke: #FF9D7A; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 7 7; marker-end: url(#arrow-orange); }
    </style>
  </defs>

  <rect width="1280" height="470" rx="20" fill="#F7F8FA"/>
  <rect width="1280" height="470" rx="20" fill="url(#dot-grid)"/>

  <g transform="translate(-15 7) scale(0.97)">

  <!-- Main flow connectors -->
  <path class="line" d="M198 166H236"/>
  <path class="line" d="M416 166H449"/>
  <path class="line" d="M653 166H686"/>
  <path class="line" d="M886 166H919"/>
  <path class="line" d="M1123 166H1160"/>
  <path class="line" d="M1226 208V296"/>

  <!-- Failure branches -->
  <path class="line" d="M551 236V292"/>
  <path class="line" d="M1021 236V292"/>
  <text x="566" y="257" class="edge-label">未达标</text>
  <text x="1036" y="257" class="edge-label">未成立</text>
  <text x="659" y="151" class="edge-label">通过</text>
  <text x="1139" y="151" class="edge-label">通过</text>

  <!-- Feedback loops routed below cards -->
  <path class="feedback" d="M551 374V424H326V211"/>
  <path class="feedback" d="M1021 374V424H786V211"/>
  <text x="411" y="444" class="edge-label" fill="#C96B4F">优化后复测</text>
  <text x="866" y="444" class="edge-label" fill="#C96B4F">调整后复测</text>

  <!-- Start -->
  <g>
    <rect x="48" y="126" width="150" height="80" rx="40" fill="#E9EDFF"/>
  </g>
  <text x="123" y="159" text-anchor="middle" class="title">首批产品</text>
  <text x="123" y="182" text-anchor="middle" class="body">完成交付准备</text>

  <!-- KOC -->
  <g>
    <rect x="236" y="121" width="180" height="90" rx="18" fill="#E9EDFF"/>
  </g>
  <text x="326" y="158" text-anchor="middle" class="title">7 名 KOC 测试</text>
  <text x="326" y="183" text-anchor="middle" class="body">真实家庭使用</text>

  <!-- Retention decision: rounded diamond preserves decision semantics -->
  <g>
    <path d="M551 96 Q560 96 570 104 L641 151 Q653 158 653 166 Q653 174 641 181 L570 228 Q560 236 551 236 Q542 236 532 228 L461 181 Q449 174 449 166 Q449 158 461 151 L532 104 Q542 96 551 96 Z" fill="#EEE7FF"/>
  </g>
  <rect x="522" y="125" width="58" height="22" rx="7" fill="#DDD2FF"/>
  <text x="551" y="140" text-anchor="middle" class="badge" fill="#7257C7">门槛 01</text>
  <text x="551" y="178" text-anchor="middle" class="title">7 日留存达标？</text>

  <!-- Paid early adopters -->
  <g>
    <rect x="686" y="121" width="200" height="90" rx="18" fill="#E5F8F7"/>
  </g>
  <text x="786" y="158" text-anchor="middle" class="title">约 70 名付费早鸟</text>
  <text x="786" y="183" text-anchor="middle" class="body">验证真实购买意愿</text>

  <!-- Payment decision: rounded diamond preserves decision semantics -->
  <g>
    <path d="M1021 96 Q1030 96 1040 104 L1111 151 Q1123 158 1123 166 Q1123 174 1111 181 L1040 228 Q1030 236 1021 236 Q1012 236 1002 228 L931 181 Q919 174 919 166 Q919 158 931 151 L1002 104 Q1012 96 1021 96 Z" fill="#EEE7FF"/>
  </g>
  <rect x="992" y="125" width="58" height="22" rx="7" fill="#DDD2FF"/>
  <text x="1021" y="140" text-anchor="middle" class="badge" fill="#7257C7">门槛 02</text>
  <text x="1021" y="178" text-anchor="middle" class="title">付费信号成立？</text>

  <!-- KOL -->
  <g>
    <rect x="1160" y="124" width="132" height="84" rx="18" fill="#E9F7ED"/>
  </g>
  <text x="1226" y="159" text-anchor="middle" class="title">KOL 推广</text>
  <text x="1226" y="182" text-anchor="middle" class="body">场景化内容</text>

  <!-- Optimize -->
  <g>
    <rect x="446" y="292" width="210" height="82" rx="18" fill="#FFF0E4"/>
  </g>
  <text x="551" y="327" text-anchor="middle" class="title">优化产品体验</text>
  <text x="551" y="351" text-anchor="middle" class="body">功能、内容或外观</text>

  <!-- Reposition -->
  <g>
    <rect x="916" y="292" width="210" height="82" rx="18" fill="#FFF0E4"/>
  </g>
  <text x="1021" y="327" text-anchor="middle" class="title">调整商业方案</text>
  <text x="1021" y="351" text-anchor="middle" class="body">定位、价格和场景</text>

  <!-- Scale -->
  <g>
    <rect x="1156" y="296" width="140" height="78" rx="39" fill="#E9F7ED"/>
  </g>
  <text x="1226" y="328" text-anchor="middle" class="title">大货生产</text>
  <text x="1226" y="351" text-anchor="middle" class="body">铺设销售渠道</text>
  </g>
</svg>
